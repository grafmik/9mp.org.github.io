<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tetris Adaptatif</title>
    <style>
        body {
            background: #202028;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }
        #game-container {
            position: relative;
            border: 2px solid #fff;
            background-color: #000;
            margin-top: 10px;
        }
        canvas {
            display: block;
        }
        #ui {
            text-align: center;
            padding: 10px;
        }
        .controls {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            gap: 10px;
            margin-top: 10px;
        }
        button {
            width: 60px;
            height: 60px;
            background: #444;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            user-select: none;
        }
        @media (min-width: 800px) {
            .controls { display: none; }
        }
    </style>
</head>
<body>

<div id="ui">
    <div id="score">Score: 0</div>
</div>

<div id="game-container">
    <canvas id="tetris"></canvas>
</div>

<div class="controls">
    <button onclick="playerMove(-1)">←</button>
    <button onclick="playerRotate(1)">↻</button>
    <button onclick="playerMove(1)">→</button>
    <div></div>
    <button onclick="playerDrop()">↓</button>
</div>

<script>
    const canvas = document.getElementById('tetris');
    const context = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');

    const BLOCK_SIZE = 30; // Taille fixe en pixels
    let cols, rows;
    let board = [];

    function initMatrix() {
        const screenWidth = window.innerWidth;

        // Calcul de la largeur adaptative (colonnes)
        cols = Math.floor((screenWidth * 0.9) / BLOCK_SIZE);
        if (cols < 10) cols = 10; // Minimum vital
        rows = Math.floor((window.innerHeight * 0.6) / BLOCK_SIZE);

        canvas.width = cols * BLOCK_SIZE;
        canvas.height = rows * BLOCK_SIZE;
        context.scale(BLOCK_SIZE, BLOCK_SIZE);

        board = createMatrix(cols, rows);
    }

    function createMatrix(w, h) {
        const matrix = [];
        while (h--) {
            matrix.push(new Array(w).fill(0));
        }
        return matrix;
    }

    function createPiece(type) {
        if (type === 'I') {
            return [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]];
        } else if (type === 'L') {
            return [[0, 2, 0], [0, 2, 0], [0, 2, 2]];
        } else if (type === 'J') {
            return [[0, 3, 0], [0, 3, 0], [3, 3, 0]];
        } else if (type === 'O') {
            return [[4, 4], [4, 4]];
        } else if (type === 'Z') {
            return [[5, 5, 0], [0, 5, 5], [0, 0, 0]];
        } else if (type === 'S') {
            return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
        } else if (type === 'T') {
            return [[0, 7, 0], [7, 7, 7], [0, 0, 0]];
        }
    }

    const colors = [
        null, '#FF0D72', '#0DC2FF', '#0DFF72',
        '#F538FF', '#FF8E0D', '#FFE138', '#3877FF',
    ];

    function draw() {
        context.fillStyle = '#000';
        context.fillRect(0, 0, canvas.width, canvas.height);
        drawMatrix(board, {x: 0, y: 0});
        drawMatrix(player.matrix, player.pos);
    }

    function drawMatrix(matrix, offset) {
        matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    context.fillStyle = colors[value];
                    context.fillRect(x + offset.x, y + offset.y, 1, 1);
                    context.lineWidth = 0.05;
                    context.strokeStyle = 'white';
                    context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                }
            });
        });
    }

    function merge(board, player) {
        player.matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    board[y + player.pos.y][x + player.pos.x] = value;
                }
            });
        });
    }

    function collide(board, player) {
        const [m, o] = [player.matrix, player.pos];
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < m[y].length; ++x) {
                if (m[y][x] !== 0 &&
                    (board[y + o.y] && board[y + o.y][x + o.x]) !== 0) {
                    return true;
                }
            }
        }
        return false;
    }

    function arenaSweep() {
        let rowCount = 1;
        outer: for (let y = board.length - 1; y > 0; --y) {
            for (let x = 0; x < board[y].length; ++x) {
                if (board[y][x] === 0) {
                    continue outer;
                }
            }
            const row = board.splice(y, 1)[0].fill(0);
            board.unshift(row);
            ++y;
            player.score += rowCount * 10;
            rowCount *= 2;
        }
        scoreElement.innerText = "Score: " + player.score;
    }

    function playerDrop() {
        player.pos.y++;
        if (collide(board, player)) {
            player.pos.y--;
            merge(board, player);
            playerReset();
            arenaSweep();
        }
        dropCounter = 0;
    }

    function playerMove(dir) {
        player.pos.x += dir;
        if (collide(board, player)) {
            player.pos.x -= dir;
        }
    }

    function playerReset() {
        const pieces = 'ILJOTSZ';
        player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
        player.pos.y = 0;
        player.pos.x = (board[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
        if (collide(board, player)) {
            board.forEach(row => row.fill(0));
            player.score = 0;
            scoreElement.innerText = "Score: 0";
        }
    }

    function playerRotate(dir) {
        const pos = player.pos.x;
        let offset = 1;
        rotate(player.matrix, dir);
        while (collide(board, player)) {
            player.pos.x += offset;
            offset = -(offset + (offset > 0 ? 1 : -1));
            if (offset > player.matrix[0].length) {
                rotate(player.matrix, -dir);
                player.pos.x = pos;
                return;
            }
        }
    }

    function rotate(matrix, dir) {
        for (let y = 0; y < matrix.length; ++y) {
            for (let x = 0; x < y; ++x) {
                [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
        }
        if (dir > 0) matrix.forEach(row => row.reverse());
        else matrix.reverse();
    }

    let dropCounter = 0;
    let dropInterval = 1000;
    let lastTime = 0;

    function update(time = 0) {
        const deltaTime = time - lastTime;
        lastTime = time;
        dropCounter += deltaTime;
        if (dropCounter > dropInterval) {
            playerDrop();
        }
        draw();
        requestAnimationFrame(update);
    }

    const player = {
        pos: {x: 0, y: 0},
        matrix: null,
        score: 0,
    };

    document.addEventListener('keydown', event => {
        if (event.keyCode === 37) playerMove(-1);
        else if (event.keyCode === 39) playerMove(1);
        else if (event.keyCode === 40) playerDrop();
        else if (event.keyCode === 81) playerRotate(-1);
        else if (event.keyCode === 87 || event.keyCode === 38) playerRotate(1);
    });

    // Initialisation
    window.addEventListener('resize', initMatrix);
    initMatrix();
    playerReset();
    update();
</script>
</body>
</html>
